<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クマモト・リズム・セッション ポスター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: #ffde00; 
        }
        .vibrant-gradient {
            background: linear-gradient(135deg, #ff0055 0%, #ff5e00 50%, #7000ff 100%);
        }
        .halftone {
            background-image: radial-gradient(#000 15%, transparent 16%);
            background-size: 15px 15px;
            opacity: 0.1;
            /* Changed to fixed so it covers the whole screen on long mobile scrolls */
            position: fixed;
            inset: 0;
            pointer-events: none;
        }
        @keyframes heart-beat {
            0% { transform: scale(1); }
            10% { transform: scale(1.03); }
            20% { transform: scale(1); }
            30% { transform: scale(1.02); }
            40% { transform: scale(1); }
        }
        .beat-heavy {
            animation: heart-beat 1.2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }
        .bar {
            width: 5px;
            background: white;
            border-radius: 2px;
            animation: bar-dance 0.8s infinite ease-in-out;
        }
        @keyframes bar-dance {
            0%, 100% { height: 8px; }
            50% { height: 28px; }
        }
        .clickable-qr {
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            text-decoration: none !important;
        }
        .clickable-qr:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8">
    <div class="halftone"></div>

    <div class="relative z-10 w-full max-w-2xl bg-white rounded-[2rem] sm:rounded-[3rem] overflow-hidden flex flex-col border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] sm:shadow-[12px_12px_0px_0px_rgba(0,0,0,1)]">
        
        <div class="vibrant-gradient p-8 sm:p-14 text-white relative overflow-hidden border-b-4 border-black">
            <div class="relative z-10">
                <div class="flex items-center space-x-2 mb-6">
                    <div class="bar" style="animation-delay: 0.1s"></div>
                    <div class="bar" style="animation-delay: 0.3s"></div>
                    <div class="bar" style="animation-delay: 0.5s"></div>
                    <div class="bar" style="animation-delay: 0.2s"></div>
                    <span class="text-[10px] sm:text-xs font-black uppercase tracking-[0.2em] sm:tracking-[0.4em] bg-black/30 px-3 py-1 rounded">Beat Beyond Words</span>
                </div>
                
                <p class="text-lg sm:text-2xl font-black mb-2 tracking-tight drop-shadow-md">
                    言葉より、早くつながる方法がある。
                </p>
                
                <h1 class="text-4xl sm:text-7xl font-black leading-none mb-8 tracking-tighter beat-heavy drop-shadow-[5px_5px_0px_rgba(0,0,0,0.4)]">
                    ドンドコ、熊本。
                </h1>
                
                <div class="flex items-center space-x-4">
                    <span class="text-3xl sm:text-4xl animate-bounce">🥁</span>
                    <p class="text-xl sm:text-2xl font-black italic bg-white/20 backdrop-blur-sm px-4 py-1 rounded-lg border border-white/30">リズムで、つながる。</p>
                </div>
                <p class="mt-4 text-lg sm:text-xl font-bold opacity-90">コトバはいらない。</p>
            </div>
        </div>

        <div class="p-6 sm:p-12 bg-white flex-grow relative">
            <div class="max-w-lg mx-auto space-y-8 sm:space-y-10">
                
                <div class="space-y-6">
                    <div class="inline-block bg-yellow-400 border-2 border-black px-4 py-1 transform -rotate-1 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                        <p class="text-xl sm:text-2xl font-black text-black">
                            隣に座った「台湾の人」と、
                        </p>
                    </div>
                    
                    <p class="text-xl sm:text-2xl font-black text-slate-900 leading-snug">
                        ただ一緒に太鼓を叩いてみる。<br>
                        すると、少し不思議な時間が生まれる。
                    </p>
                    
                    <p class="text-lg sm:text-xl font-bold text-slate-600 border-l-8 border-orange-500 pl-4">
                        熊本のまちなかで、新しい「つながり」を<br class="hidden sm:block">
                        体験してみませんか？
                    </p>
                </div>

                <div class="bg-yellow-400 border-4 border-black p-4 sm:p-6 rounded-2xl shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] text-center transform hover:scale-[1.02] transition-transform">
                    <p class="text-lg sm:text-2xl font-black text-black tracking-tighter">
                        1時間ミニセッション｜5月中旬｜熊本市内
                    </p>
                    <p class="text-lg font-black text-red-600 mt-1">参加無料</p>
                </div>

                <div class="bg-teal-400 border-4 border-black p-4 sm:p-5 rounded-2xl flex items-center justify-center space-x-4 shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] animate-pulse">
                    <span class="text-3xl sm:text-4xl">🎁</span>
                    <div class="text-center">
                        <span class="text-xl sm:text-2xl font-black text-white drop-shadow-[2px_2px_0px_rgba(0,0,0,1)]">台湾からのサプライズあり！</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-black p-8 sm:p-10 pb-12 flex flex-col items-center">
            <p class="text-white font-black text-lg sm:text-xl mb-4 tracking-widest text-center">
                気になった方は、まずは登録！
            </p>
            <p class="text-yellow-400 text-xs sm:text-sm font-bold mb-8 text-center opacity-90">
                ※開催が確定次第、詳細を優先的にご案内します。
            </p>

            <a id="registration-link" href="#" target="_blank" class="clickable-qr bg-white p-4 sm:p-6 rounded-2xl flex items-center space-x-4 sm:space-x-8 max-w-sm w-full border-4 border-yellow-400 shadow-[0_0_20px_rgba(255,222,0,0.3)] hover:bg-yellow-50">
                <div class="w-20 h-20 sm:w-24 sm:h-24 shrink-0 rounded-lg overflow-hidden border border-gray-100 shadow-inner">
                    <img id="qr-image" 
                         src="" 
                         alt="QR Code" 
                         class="w-full h-full object-cover">
                </div>
                <div class="flex flex-col text-left">
                    <span class="font-black text-base sm:text-lg text-black leading-tight">先行案内・興味あり登録</span>
                    <span class="text-[9px] sm:text-[10px] font-black text-slate-400 uppercase tracking-widest mt-2 italic">タップしてフォームを開く</span>
                    <div class="mt-2 bg-teal-500 text-white text-[10px] px-2 py-1 rounded-full text-center font-bold">CLICK HERE</div>
                </div>
            </a>
        </div>
    </div>

    <script>
        // Paste your Google Form URL here
        const registrationUrl = "https://docs.google.com/forms/u/0/"; 
        
        document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(registrationUrl)}`;
        document.getElementById('registration-link').href = registrationUrl;
    </script>
</body>
</html>
