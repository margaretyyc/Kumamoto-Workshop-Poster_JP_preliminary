<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat Beyond Words - クマモト・リズム・セッション</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: #ffde00; 
        }
        .vibrant-gradient {
            background: linear-gradient(135deg, #ff0055 0%, #ff5e00 50%, #7000ff 100%);
        }
        .halftone {
            background-image: radial-gradient(#000 15%, transparent 16%);
            background-size: 15px 15px;
            opacity: 0.1;
            position: fixed;
            inset: 0;
            pointer-events: none;
        }
        @keyframes heart-beat {
            0% { transform: scale(1); }
            10% { transform: scale(1.05); }
            20% { transform: scale(1); }
            30% { transform: scale(1.03); }
            40% { transform: scale(1); }
        }
        .beat-heavy {
            animation: heart-beat 1.2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
            display: inline-block;
        }
        .bar {
            width: 5px;
            background: white;
            border-radius: 2px;
            animation: bar-dance 0.8s infinite ease-in-out;
        }
        @keyframes bar-dance {
            0%, 100% { height: 8px; }
            50% { height: 28px; }
        }
        .clickable-qr {
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            text-decoration: none !important;
        }
        .clickable-qr:active {
            transform: scale(0.95);
        }
    </style>
</head>
