<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beat Beyond Words - 熊本太鼓セッション</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: #ffde00; -webkit-font-smoothing: antialiased; }
        .vibrant-gradient { background: linear-gradient(135deg, #ff0055 0%, #ff5e00 50%, #7000ff 100%); }
        @keyframes bounce-gentle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .taiko-bounce { animation: bounce-gentle 1.8s infinite ease-in-out; }
        .gift-pulse { animation: pulse-custom 2.5s infinite; }
        @keyframes pulse-custom { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        /* 防止手機端文字溢出 */
        .smart-break { word-break: keep-all; overflow-wrap: break-word; }
    </style>
</head>
<body class="min-h-screen flex items-start sm:items-center justify-center p-2 sm:p-8">
    <div class="relative w-full max-w-2xl bg-white rounded-[1.5rem] sm:rounded-[3rem] overflow-hidden flex flex-col border-[3px] sm:border-4 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] sm:shadow-[12px_12px_0px_0px_rgba(0,0,0,1)]">
        
        <div class="vibrant-gradient p-6 sm:p-14 text-white relative border-b-[3px] sm:border-b-4 border-black text-center sm:text-left">
            <div class="mb-4 sm:mb-6 space-y-1">
                <p class="text-lg sm:text-2xl font-black tracking-tight drop-shadow-md">言葉より、早くつながる。</p>
                <p class="text-lg sm:text-2xl font-[900] text-yellow-300 drop-shadow-[2px_2px_0px_rgba(0,0,0,0.3)]">跨越語言，用節奏交朋友。</p>
            </div>
            
            <h1 class="text-[8.5vw] sm:text-8xl font-[900] leading-[1.1] mb-6 sm:mb-8 tracking-tighter drop-shadow-[3px_3px_0px_rgba(0,0,0,0.4)] smart-break">
                ドンドコ、熊本。
            </h1>
            
            <div class="flex flex-col sm:flex-row items-center justify-center sm:justify-start space-y-4 sm:space-y-0 sm:space-x-6">
                <div class="taiko-bounce relative w-16 h-16 sm:w-24 sm:h-24">
                    <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-lg">
                        <rect x="25" y="10" width="6" height="40" rx="3" fill="#FDF2F2" stroke="#000" stroke-width="2" transform="rotate(-30 25 10)"/>
                        <rect x="65" y="10" width="6" height="40" rx="3" fill="#FDF2F2" stroke="#000" stroke-width="2" transform="rotate(30 65 10)"/>
                        <path d="M15 45 C 15 35, 85 35, 85 45 L 85 75 C 85 85, 15 85, 15 75 Z" fill="#991B1B" stroke="#000" stroke-width="3"/>
                        <ellipse cx="50" cy="45" rx="35" ry="10" fill="#FFF" stroke="#000" stroke-width="3"/>
                        <circle cx="25" cy="58" r="2.2" fill="#FBBF24" stroke="#000" stroke-width="1"/>
                        <circle cx="50" cy="63" r="2.2" fill="#FBBF24" stroke="#000" stroke-width="1"/>
                        <circle cx="75" cy="58" r="2.2" fill="#FBBF24" stroke="#000" stroke-width="1"/>
                    </svg>
                </div>
                <p class="text-lg sm:text-2xl font-black italic bg-white/20 backdrop-blur-sm px-4 py-1.5 rounded-xl border border-white/30">太鼓で、つながる。</p>
            </div>
        </div>

        <div class="p-5 sm:p-12 bg-white flex-grow">
            <div class="max-w-lg mx-auto space-y-10 sm:space-y-14">
                
                <div class="space-y-10">
                    <div class="flex flex-col items-start space-y-2">
                        <div class="bg-yellow-400 border-2 border-black px-3 py-0.5 transform -rotate-2 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)]">
                            <p class="text-base sm:text-lg font-black">コトバはいらない。</p>
                        </div>
                        <p class="text-base sm:text-xl font-black text-slate-900 leading-relaxed smart-break">
                            隣の人と、リズムでつながる。<br>
                            ただ一緒に、太鼓を叩いてみる。<br>
                            そこで生まれる、不思議な時間。<br>
                            <span class="text-red-600">熊本で、新しいつながりを。</span>
                        </p>
                    </div>

                    <div class="flex flex-col items-end text-right space-y-2">
                        <div class="bg-yellow-400 border-2 border-black px-3 py-0.5 transform rotate-2 shadow-[-3px_3px_0px_0px_rgba(0,0,0,1)]">
                            <p class="text-base sm:text-lg font-black">不用再怕日文不夠好。</p>
                        </div>
                        <p class="text-base sm:text-xl font-black text-slate-900 leading-relaxed smart-break">
                            只要拿起鼓棒跟著敲動，<br>
                            就能與在地人交朋友。<br>
                            享受這段奇妙時光，<br>
                            <span class="text-red-600">在熊本，遇見新的連結。</span>
                        </p>
                    </div>
                </div>

                <div class="bg-yellow-400 border-[3px] sm:border-4 border-black p-5 sm:p-8 rounded-2xl shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] text-center">
                    <div class="flex flex-col space-y-2 sm:space-y-4 font-[900] text-black tracking-tighter">
                        <div class="text-lg sm:text-2xl border-b-2 border-black/10 pb-2">1時間ミニセッション</div>
                        <div class="text-lg sm:text-2xl border-b-2 border-black/10 pb-2">5月中旬 | 熊本市内</div>
                        <div class="pt-2">
                            <span class="text-red-600 text-sm sm:text-lg font-black block">初心者OK</span>
                            <div class="text-red-600 text-4xl sm:text-6xl font-[900]">参加無料</div>
                        </div>
                    </div>
                </div>

                <div class="gift-pulse bg-teal-400 border-[3px] border-black p-4 rounded-2xl flex flex-col items-center justify-center shadow-[5px_5px_0px_0px_rgba(0,0,0,1)]">
                    <div class="flex items-center space-x-2">
                        <span class="text-2xl">🎁</span>
                        <span class="text-lg sm:text-xl font-black text-white drop-shadow-[1px_1px_0px_rgba(0,0,0,1)]">【台湾×熊本】交流サプライズ！</span>
                    </div>
                    <p class="text-xs sm:text-sm font-bold text-white/90 mt-1">【台灣×熊本】交流驚喜小禮！</p>
                </div>
            </div>
        </div>

        <div class="bg-black p-6 sm:p-10 flex flex-col items-center">
            <a id="registration-link" href="#" target="_blank" class="bg-white p-4 sm:p-5 rounded-2xl flex items-center space-x-4 sm:space-x-6 w-full max-w-sm border-[3px] border-yellow-400 active:scale-95 transition-transform">
                <div class="w-16 h-16 sm:w-20 sm:h-20 shrink-0 border border-gray-100 rounded-lg overflow-hidden">
                    <img id="qr-image" src="" alt="QR" class="w-full h-full">
                </div>
                <div class="flex flex-col text-left text-black">
                    <span class="font-[900] text-sm sm:text-base leading-tight">先行案内・登録報名</span>
                    <span class="text-[9px] sm:text-[10px] font-black text-slate-400 uppercase mt-1 italic">點擊填寫預約表單</span>
                    <div class="mt-2 bg-teal-500 text-white text-[10px] px-3 py-1 rounded-full text-center font-bold">CLICK HERE</div>
                </div>
            </a>
            <p class="text-white/40 text-[9px] mt-4 uppercase tracking-widest font-bold">※開催確定後、詳細をご案内します</p>
        </div>
    </div>

    <script>
        const registrationUrl = "https://docs.google.com/forms/d/e/1FAIpQLSfL-ZtE8JiEy1RkXCkhuHbMBcGajDhIil0Bes4FdTb-W3jRcQ/viewform?hl=ja";
        document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(registrationUrl)}`;
        document.getElementById('registration-link').href = registrationUrl;
    </script>
</body>
</html>
